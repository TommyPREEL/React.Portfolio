name: Docker Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=$(echo 'ghcr.io/${{ github.repository_owner }}/portfolio-app:latest' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate deployment secrets
        id: validate-secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=()
          [ -z "$SSH_HOST" ] && missing+=("SSH_HOST")
          [ -z "$SSH_USERNAME" ] && missing+=("SSH_USERNAME")
          [ -z "$SSH_PRIVATE_KEY" ] && missing+=("SSH_PRIVATE_KEY")
          [ -z "$DEPLOY_PATH" ] && missing+=("DEPLOY_PATH")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Deployment secrets not configured (${missing[*]}). Skipping deployment."
            echo "deploy_enabled=false" >> $GITHUB_OUTPUT
          else
            echo "deploy_enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.validate-secrets.outputs.deploy_enabled == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 5m
          envs: GHCR_ACTOR,GHCR_TOKEN,IMAGE,DEPLOY_PATH
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            echo "IMAGE=$IMAGE" > .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
