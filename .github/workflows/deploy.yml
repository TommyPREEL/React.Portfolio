name: Docker Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=$(echo 'ghcr.io/${{ github.repository_owner }}/portfolio-app:latest' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 5m
          envs: GHCR_ACTOR,GHCR_TOKEN,IMAGE,DEPLOY_PATH
          script: |
            # Source shell profiles to get full PATH in non-interactive SSH sessions
            [ -f /etc/profile ] && . /etc/profile
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc
            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/snap/bin"

            # Verify docker is available
            if ! command -v docker &> /dev/null; then
              echo "ERROR: docker not found in PATH: $PATH"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            echo "IMAGE=$IMAGE" > .env
            cat > docker-compose.yml <<'COMPOSEFILE'
            services:
              portfolio-app:
                image: ${IMAGE}
                container_name: portfolio-app
                restart: always
                ports:
                  - "3200:80"
            COMPOSEFILE
            if docker compose version > /dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi
            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d --remove-orphans
            docker image prune -f
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
